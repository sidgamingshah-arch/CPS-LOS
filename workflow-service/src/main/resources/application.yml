server:
  port: ${SERVER_PORT:8089}

spring:
  application:
    name: workflow-service
  config:
    import: "optional:file:${HELIX_LLM_CONFIG:config/llm.yml}"
  datasource:
    url: jdbc:sqlite:${HELIX_DATA_DIR:./data}/workflow.db
    driver-class-name: org.sqlite.JDBC
    hikari:
      maximum-pool-size: 1
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.community.dialect.SQLiteDialect
    show-sql: false

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always

helix:
  config-service:
    base-url: ${CONFIG_SERVICE_URL:http://localhost:8081}
  workflow:
    sla-sweep-cron: "0 */5 * * * *"   # every 5 minutes

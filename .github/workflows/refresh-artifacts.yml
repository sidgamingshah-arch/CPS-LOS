name: Refresh prebuilt jars

# Rebuilds the 9 service jars whenever backend code changes and republishes them
# to the `artifacts-prebuilt` branch, so machines without Maven (or with the wrong
# JDK major) can run the stack via scripts/run-all.* without a local build.
#
# No loop risk: this triggers on the source branches below, never on
# `artifacts-prebuilt` (the only branch it writes to).

on:
  push:
    branches:
      - main
      - claude/amazing-mayer-kaCZy
    paths:
      - '**/*.java'
      - '**/pom.xml'
      - 'pom.xml'
      - '.mvn/**'
      - 'mvnw'
      - '.github/workflows/refresh-artifacts.yml'
  workflow_dispatch: {}

permissions:
  contents: write

# Serialise publishes so two runs never race on the artifacts branch tip.
concurrency:
  group: refresh-artifacts
  cancel-in-progress: false

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Build all service jars
        run: |
          chmod +x ./mvnw
          ./mvnw -B -DskipTests package

      - name: Publish jars to artifacts-prebuilt
        env:
          SRC_SHA: ${{ github.sha }}
          SRC_REF: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          services="config counterparty origination risk decision portfolio copilot limit gateway"

          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Stash the freshly built jars outside the tree before we add a worktree.
          mkdir -p "$RUNNER_TEMP/jars"
          for s in $services; do
            cp "${s}-service/target/${s}-service.jar" "$RUNNER_TEMP/jars/${s}-service.jar"
          done

          # Check out artifacts-prebuilt in a sibling worktree (the main checkout stays
          # on the source branch). Create it from HEAD if it doesn't exist yet.
          if git ls-remote --exit-code --heads origin artifacts-prebuilt >/dev/null 2>&1; then
            git fetch origin artifacts-prebuilt
            git worktree add -B artifacts-prebuilt ../artifacts origin/artifacts-prebuilt
          else
            git worktree add -b artifacts-prebuilt ../artifacts HEAD
          fi

          # Drop the jars into their target/ slots (force-add: *.jar is gitignored).
          for s in $services; do
            mkdir -p "../artifacts/${s}-service/target"
            cp "$RUNNER_TEMP/jars/${s}-service.jar" "../artifacts/${s}-service/target/${s}-service.jar"
          done

          cd ../artifacts
          git add -f ./*-service/target/*-service.jar
          if git diff --cached --quiet; then
            echo "Jars are byte-identical to the published set — nothing to do."
            exit 0
          fi
          git commit -m "Refresh prebuilt jars from ${SRC_REF}@${SRC_SHA}"
          git push origin artifacts-prebuilt

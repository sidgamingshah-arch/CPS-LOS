name: Refresh prebuilt jars

# Rebuilds the 9 service jars whenever backend code changes and republishes them
# as assets on the rolling `prebuilt-latest` GitHub Release. No git history bloat;
# stable download URLs at /releases/download/prebuilt-latest/<service>-service.jar.

on:
  push:
    branches:
      - main
      - claude/amazing-mayer-kaCZy
    paths:
      - '**/*.java'
      - '**/pom.xml'
      - 'pom.xml'
      - '.mvn/**'
      - 'mvnw'
      - '.github/workflows/refresh-artifacts.yml'
  workflow_dispatch: {}

permissions:
  contents: write

# Serialise so two runs never race on the same release tag.
concurrency:
  group: refresh-artifacts
  cancel-in-progress: false

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'
          cache: maven

      - name: Build all service jars
        run: |
          chmod +x ./mvnw
          ./mvnw -B -DskipTests package

      - name: Stage jars for release
        run: |
          set -euo pipefail
          mkdir -p staging
          for s in config counterparty origination risk decision portfolio copilot limit gateway; do
            cp "${s}-service/target/${s}-service.jar" "staging/${s}-service.jar"
          done
          ls -lh staging/

      - name: Publish to `prebuilt-latest` release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: prebuilt-latest
          name: Prebuilt jars (rolling)
          # Replace assets in place each run so download URLs stay stable.
          # `make_latest: legacy` lets real semver releases (if you ever add
          # any) keep the GitHub "Latest" badge.
          make_latest: legacy
          prerelease: false
          files: staging/*-service.jar
          fail_on_unmatched_files: true
          body: |
            Prebuilt service jars for all 9 modules. Targets Java 25 bytecode
            (`--release 25`); boots on Java 25+ (Spring Boot 3.5.16 formally
            supports Java 25).

            Source snapshot: `${{ github.ref_name }}@${{ github.sha }}`.

            Fetch all 9 from a checkout:

            ```bash
            bash scripts/fetch-prebuilt.sh           # Linux / Mac
            .\scripts\fetch-prebuilt.ps1             # Windows / PowerShell
            ```

            Or a single jar by name:

            ```
            https://github.com/${{ github.repository }}/releases/download/prebuilt-latest/<service>-service.jar
            ```

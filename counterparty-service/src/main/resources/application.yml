server:
  port: ${SERVER_PORT:8082}

spring:
  application:
    name: counterparty-service
  config:
    import: "optional:file:${HELIX_LLM_CONFIG:config/llm.yml}"
  datasource:
    url: jdbc:sqlite:${HELIX_DATA_DIR:./data}/counterparty.db
    driver-class-name: org.sqlite.JDBC
    hikari:
      maximum-pool-size: 1
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.community.dialect.SQLiteDialect
    show-sql: false
  # Allow a realistic trade-licence / MOA / AOA PDF for the create-screen autofill upload
  # (Spring's 1MB default is too small). The parsed text is capped in-service regardless.
  servlet:
    multipart:
      max-file-size: 25MB
      max-request-size: 30MB

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always

helix:
  config-service:
    base-url: ${CONFIG_SERVICE_URL:http://localhost:8081}
  workflow-service:
    base-url: ${WORKFLOW_SERVICE_URL:http://localhost:8089}

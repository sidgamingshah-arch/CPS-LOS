server:
  port: ${SERVER_PORT:8085}

spring:
  application:
    name: decision-service
  config:
    import: "optional:file:${HELIX_LLM_CONFIG:config/llm.yml}"
  datasource:
    url: jdbc:sqlite:${HELIX_DATA_DIR:./data}/decision.db
    driver-class-name: org.sqlite.JDBC
    hikari:
      maximum-pool-size: 1
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.community.dialect.SQLiteDialect
    show-sql: false

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always

helix:
  config-service:
    base-url: ${CONFIG_SERVICE_URL:http://localhost:8081}
  counterparty-service:
    base-url: ${COUNTERPARTY_SERVICE_URL:http://localhost:8082}
  origination-service:
    base-url: ${ORIGINATION_SERVICE_URL:http://localhost:8083}
  risk-service:
    base-url: ${RISK_SERVICE_URL:http://localhost:8084}
  limit-service:
    base-url: ${LIMIT_SERVICE_URL:http://localhost:8088}
  workflow-service:
    base-url: ${WORKFLOW_SERVICE_URL:http://localhost:8089}

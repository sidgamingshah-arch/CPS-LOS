server:
  port: ${SERVER_PORT:8084}

spring:
  application:
    name: risk-service
  datasource:
    url: jdbc:sqlite:${HELIX_DATA_DIR:./data}/risk.db
    driver-class-name: org.sqlite.JDBC
    hikari:
      maximum-pool-size: 1
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.community.dialect.SQLiteDialect
    show-sql: false

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always

helix:
  config-service:
    base-url: ${CONFIG_SERVICE_URL:http://localhost:8081}
  origination-service:
    base-url: ${ORIGINATION_SERVICE_URL:http://localhost:8083}

server:
  port: ${SERVER_PORT:8083}

spring:
  application:
    name: origination-service
  datasource:
    url: jdbc:sqlite:${HELIX_DATA_DIR:./data}/origination.db
    driver-class-name: org.sqlite.JDBC
    hikari:
      maximum-pool-size: 1
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.community.dialect.SQLiteDialect
    show-sql: false

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always

